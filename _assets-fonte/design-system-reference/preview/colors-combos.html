<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card">
  <div class="label-small">Combinações aprovadas</div>
  <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;">
    <div style="background:#043959;border-radius:8px;padding:14px;min-height:78px;">
      <div style="color:#fff;font-family:var(--font-display);font-weight:700;font-size:14px;line-height:1.2;">Confiança</div>
      <div style="color:#C9DFF2;font-size:11px;margin-top:4px;">texto sobre profundo</div>
    </div>
    <div style="background:#C9DFF2;border-radius:8px;padding:14px;min-height:78px;">
      <div style="color:#043959;font-family:var(--font-display);font-weight:700;font-size:14px;line-height:1.2;">Empatia</div>
      <div style="color:#386D8C;font-size:11px;margin-top:4px;">texto sobre brisa</div>
    </div>
    <div style="background:#DDC9C3;border-radius:8px;padding:14px;min-height:78px;">
      <div style="color:#043959;font-family:var(--font-display);font-weight:700;font-size:14px;line-height:1.2;">Cuidado</div>
      <div style="color:#043959;opacity:.65;font-size:11px;margin-top:4px;">texto sobre bege</div>
    </div>
    <div style="background:#fff;border:1px solid rgba(4,57,89,.1);border-radius:8px;padding:14px;min-height:78px;">
      <div style="color:#043959;font-family:var(--font-display);font-weight:700;font-size:14px;line-height:1.2;">Clareza</div>
      <div style="color:#4B6478;font-size:11px;margin-top:4px;">texto sobre branco</div>
    </div>
    <div style="background:#66ADD9;border-radius:8px;padding:14px;min-height:78px;">
      <div style="color:#043959;font-family:var(--font-display);font-weight:700;font-size:14px;line-height:1.2;">Renovação</div>
      <div style="color:#043959;opacity:.65;font-size:11px;margin-top:4px;">accent sobre renovação</div>
    </div>
    <div style="background:#8298A8;border-radius:8px;padding:14px;min-height:78px;">
      <div style="color:#fff;font-family:var(--font-display);font-weight:700;font-size:14px;line-height:1.2;">Serenidade</div>
      <div style="color:#C9DFF2;font-size:11px;margin-top:4px;">texto sobre cinza</div>
    </div>
  </div>
</div></body></html>
