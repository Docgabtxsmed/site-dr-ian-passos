<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card">
  <div class="label-small">Border radius</div>
  <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:14px;align-items:end;">
    <div style="display:flex;flex-direction:column;align-items:center;gap:8px;">
      <div style="width:78px;height:78px;background:#C9DFF2;border:1px solid rgba(4,57,89,.18);border-radius:6px;"></div>
      <div style="font-size:11.5px;color:#043959;font-weight:600;">6px</div>
      <div style="font-size:10.5px;color:var(--fg-muted);">tags · chips</div>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:8px;">
      <div style="width:78px;height:78px;background:#C9DFF2;border:1px solid rgba(4,57,89,.18);border-radius:8px;"></div>
      <div style="font-size:11.5px;color:#043959;font-weight:600;">8px</div>
      <div style="font-size:10.5px;color:var(--fg-muted);">botões · inputs</div>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:8px;">
      <div style="width:78px;height:78px;background:#C9DFF2;border:1px solid rgba(4,57,89,.18);border-radius:12px;"></div>
      <div style="font-size:11.5px;color:#043959;font-weight:600;">12px</div>
      <div style="font-size:10.5px;color:var(--fg-muted);">cards</div>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:8px;">
      <div style="width:78px;height:78px;background:#C9DFF2;border:1px solid rgba(4,57,89,.18);border-radius:16px;"></div>
      <div style="font-size:11.5px;color:#043959;font-weight:600;">16px</div>
      <div style="font-size:10.5px;color:var(--fg-muted);">hero · cards grandes</div>
    </div>
  </div>
  <div style="font-size:11.5px;color:var(--fg-muted);line-height:1.5;border-top:1px solid rgba(4,57,89,.08);padding-top:10px;">⚠ <strong style="color:#043959;">Nunca</strong> pill / fully rounded em botões. Máximo 16px. Avatares/ícones em círculo são exceção.</div>
</div></body></html>
