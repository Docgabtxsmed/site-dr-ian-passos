<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card">
  <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:10px;flex:1;">
    <div style="display:flex;flex-direction:column;gap:6px;">
      <div style="height:96px;background:#043959;border-radius:8px;"></div>
      <div style="font-weight:600;font-size:12.5px;line-height:1.2;">Azul Profundo<br><span style="font-weight:400;color:var(--fg-muted);">Vital</span></div>
      <div class="mono">#043959</div>
    </div>
    <div style="display:flex;flex-direction:column;gap:6px;">
      <div style="height:96px;background:#8298A8;border-radius:8px;"></div>
      <div style="font-weight:600;font-size:12.5px;line-height:1.2;">Cinza Neblina<br><span style="font-weight:400;color:var(--fg-muted);">Suave</span></div>
      <div class="mono">#8298A8</div>
    </div>
    <div style="display:flex;flex-direction:column;gap:6px;">
      <div style="height:96px;background:#66ADD9;border-radius:8px;"></div>
      <div style="font-weight:600;font-size:12.5px;line-height:1.2;">Azul Renovação</div>
      <div class="mono">#66ADD9</div>
    </div>
    <div style="display:flex;flex-direction:column;gap:6px;">
      <div style="height:96px;background:#C9DFF2;border-radius:8px;border:1px solid rgba(4,57,89,.08);"></div>
      <div style="font-weight:600;font-size:12.5px;line-height:1.2;">Azul Brisa Leve</div>
      <div class="mono">#C9DFF2</div>
    </div>
    <div style="display:flex;flex-direction:column;gap:6px;">
      <div style="height:96px;background:#DDC9C3;border-radius:8px;border:1px solid rgba(4,57,89,.08);"></div>
      <div style="font-weight:600;font-size:12.5px;line-height:1.2;">Bege Calmante</div>
      <div class="mono">#DDC9C3</div>
    </div>
  </div>
</div></body></html>
