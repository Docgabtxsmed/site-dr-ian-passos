<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card">
  <div class="label-small">Escala tipográfica · mobile-first</div>
  <div style="display:grid;grid-template-columns:1fr 60px 60px;gap:8px 16px;align-items:baseline;">
    <div style="font-family:var(--font-display);font-weight:700;font-size:32px;line-height:1.1;letter-spacing:-0.02em;color:#043959;">Atendimento humano</div>
    <div class="mono" style="color:var(--fg-muted);text-align:right;">H1</div>
    <div class="mono" style="color:var(--fg-muted);text-align:right;">32 / 56</div>

    <div style="font-family:var(--font-display);font-weight:700;font-size:24px;line-height:1.25;letter-spacing:-0.02em;color:#043959;">Onde eu atendo</div>
    <div class="mono" style="color:var(--fg-muted);text-align:right;">H2</div>
    <div class="mono" style="color:var(--fg-muted);text-align:right;">24 / 36</div>

    <div style="font-family:var(--font-display);font-weight:700;font-size:20px;line-height:1.25;color:#043959;">Boa Viagem</div>
    <div class="mono" style="color:var(--fg-muted);text-align:right;">H3</div>
    <div class="mono" style="color:var(--fg-muted);text-align:right;">20 / 22</div>

    <div style="font-family:var(--font-body);font-weight:400;font-size:16px;line-height:1.7;color:#4B6478;">Consulta clínica para adultos e crianças.</div>
    <div class="mono" style="color:var(--fg-muted);text-align:right;">body</div>
    <div class="mono" style="color:var(--fg-muted);text-align:right;">16 / 18</div>

    <div style="font-family:var(--font-body);font-weight:400;font-size:14px;line-height:1.55;color:var(--fg-muted);">CRM-PE 28737 · RQE 15742</div>
    <div class="mono" style="color:var(--fg-muted);text-align:right;">small</div>
    <div class="mono" style="color:var(--fg-muted);text-align:right;">14 / 16</div>
  </div>
  <div style="font-size:11px;color:var(--fg-muted);">Tamanho mobile / desktop (≥ 880px). H1–H3 Seravek 700; body & small Rethink Sans 400.</div>
</div></body></html>
