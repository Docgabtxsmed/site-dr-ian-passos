<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>

      <div>
        <div style="font-family:var(--font-body);font-size:11px;font-weight:600;letter-spacing:0.14em;text-transform:uppercase;color:#66ADD9;">Boa Viagem · Recife</div>

      <a style="padding:9px 14px;background:#fff;color:#043959;font-family:var(--font-body);font-size:13px;font-weight:600;border-radius:8px;border:1px solid rgba(4,57,89,.20);">Ver no mapa</a>
    </div>
  </div>
