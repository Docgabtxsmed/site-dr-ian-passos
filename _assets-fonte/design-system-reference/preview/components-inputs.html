<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card">
  <div class="label-small">Inputs · formulários</div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;">
    <div>
      <label style="display:block;font-family:var(--font-body);font-size:13px;font-weight:600;color:#043959;margin-bottom:6px;">Seu nome</label>
      <input value="Maria Souza" style="width:100%;padding:11px 14px;font-family:var(--font-body);font-size:14px;color:#043959;background:#fff;border:1px solid rgba(4,57,89,.20);border-radius:8px;outline:none;" />
    </div>
    <div>
      <label style="display:block;font-family:var(--font-body);font-size:13px;font-weight:600;color:#043959;margin-bottom:6px;">Telefone</label>
      <input placeholder="(81) 9 0000-0000" style="width:100%;padding:11px 14px;font-family:var(--font-body);font-size:14px;color:var(--fg-muted);background:#fff;border:1.5px solid #66ADD9;border-radius:8px;outline:none;box-shadow:0 0 0 3px rgba(102,173,217,.25);" />
    </div>
    <div>
      <label style="display:block;font-family:var(--font-body);font-size:13px;font-weight:600;color:#043959;margin-bottom:6px;">Convênio</label>
      <div style="position:relative;">
        <select style="width:100%;padding:11px 14px;font-family:var(--font-body);font-size:14px;color:#043959;background:#fff;border:1px solid rgba(4,57,89,.20);border-radius:8px;outline:none;appearance:none;"><option>Bradesco Saúde</option></select>
        <svg style="position:absolute;right:12px;top:50%;transform:translateY(-50%);pointer-events:none;" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#043959" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
      </div>
    </div>
    <div>
      <label style="display:block;font-family:var(--font-body);font-size:13px;font-weight:600;color:#043959;margin-bottom:6px;">E-mail</label>
      <input value="email invalido" style="width:100%;padding:11px 14px;font-family:var(--font-body);font-size:14px;color:#043959;background:#fff;border:1px solid #043959;border-radius:8px;outline:none;" />
      <div style="font-size:11.5px;color:#043959;margin-top:4px;font-weight:500;">Digite um e-mail válido para confirmação.</div>
    </div>
  </div>
</div></body></html>
