<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card" style="align-items:center;justify-content:center;">
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;width:100%;align-items:stretch;">
    <div style="background:#fff;border:1px solid rgba(4,57,89,.10);border-radius:12px;padding:20px;display:flex;align-items:center;justify-content:center;">
      <img src="../assets/logo-on-light.png" style="max-width:170px;height:auto;display:block;"/>
    </div>
    <div style="background:#043959;border-radius:12px;padding:20px;display:flex;align-items:center;justify-content:center;">
      <img src="../assets/logo-on-dark.png" style="max-width:170px;height:auto;display:block;"/>
    </div>
  </div>
  <div class="label-small">Logo · versão sobre claro / sobre profundo</div>
</div></body></html>
