<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card">
  <div class="label-small">Azul Renovação · scale</div>
  <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px;height:80px;">
    <div style="background:#EAF5FB;border-radius:4px;display:flex;align-items:flex-end;justify-content:center;padding-bottom:4px;font-size:10px;color:#043959;font-weight:600;">50</div>
    <div style="background:#CFE6F4;border-radius:4px;display:flex;align-items:flex-end;justify-content:center;padding-bottom:4px;font-size:10px;color:#043959;font-weight:600;">100</div>
    <div style="background:#A8D3EA;border-radius:4px;display:flex;align-items:flex-end;justify-content:center;padding-bottom:4px;font-size:10px;color:#043959;font-weight:600;">200</div>
    <div style="background:#8BC2E2;border-radius:4px;display:flex;align-items:flex-end;justify-content:center;padding-bottom:4px;font-size:10px;color:#043959;font-weight:600;">300</div>
    <div style="background:#66ADD9;border-radius:4px;display:flex;align-items:flex-end;justify-content:center;padding-bottom:4px;font-size:10px;color:#fff;font-weight:700;outline:1.5px solid #043959;outline-offset:1px;">400</div>
    <div style="background:#4F9AC7;border-radius:4px;display:flex;align-items:flex-end;justify-content:center;padding-bottom:4px;font-size:10px;color:#fff;font-weight:600;">500</div>
    <div style="background:#3E83AE;border-radius:4px;display:flex;align-items:flex-end;justify-content:center;padding-bottom:4px;font-size:10px;color:#fff;font-weight:600;">600</div>
  </div>
  <div style="font-size:12px;color:var(--fg-muted);">Base <span class="mono" style="background:#F2F5F8;padding:2px 6px;border-radius:4px;color:#043959;">400 · #66ADD9</span> — CTA alternativo, links, accent em fundos escuros</div>
</div></body></html>
