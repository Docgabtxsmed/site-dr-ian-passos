<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card brisa">
  <div class="label-small">Sombras · suaves, com matiz de azul profundo</div>
  <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:18px;padding:14px 4px 4px;">
    <div style="display:flex;flex-direction:column;align-items:center;gap:12px;">
      <div style="width:90px;height:60px;background:#fff;border-radius:10px;box-shadow:0 1px 2px rgba(4,57,89,.05);"></div>
      <div><div style="font-size:11.5px;color:#043959;font-weight:600;text-align:center;">shadow-xs</div><div class="mono" style="font-size:10px;color:var(--fg-muted);text-align:center;">1·2</div></div>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:12px;">
      <div style="width:90px;height:60px;background:#fff;border-radius:10px;box-shadow:0 1px 3px rgba(4,57,89,.08),0 1px 2px rgba(4,57,89,.04);"></div>
      <div><div style="font-size:11.5px;color:#043959;font-weight:600;text-align:center;">shadow-sm</div><div class="mono" style="font-size:10px;color:var(--fg-muted);text-align:center;">card default</div></div>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:12px;">
      <div style="width:90px;height:60px;background:#fff;border-radius:10px;box-shadow:0 4px 12px rgba(4,57,89,.08),0 2px 4px rgba(4,57,89,.04);"></div>
      <div><div style="font-size:11.5px;color:#043959;font-weight:600;text-align:center;">shadow-md</div><div class="mono" style="font-size:10px;color:var(--fg-muted);text-align:center;">hover</div></div>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:12px;">
      <div style="width:90px;height:60px;background:#fff;border-radius:10px;box-shadow:0 12px 32px rgba(4,57,89,.10),0 4px 8px rgba(4,57,89,.04);"></div>
      <div><div style="font-size:11.5px;color:#043959;font-weight:600;text-align:center;">shadow-lg</div><div class="mono" style="font-size:10px;color:var(--fg-muted);text-align:center;">modais</div></div>
    </div>
  </div>
</div></body></html>
