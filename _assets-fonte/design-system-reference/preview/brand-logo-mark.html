<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card">

    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:8px;">
      <div style="width:64px;height:64px;background:#C9DFF2;border-radius:8px;display:flex;align-items:center;justify-content:center;"><img src="../assets/logo-mark.png" style="width:46px;height:46px;object-fit:contain;"/></div>
      <div style="font-size:10.5px;color:var(--fg-muted);">brisa · OK</div>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:8px;">

      <div style="font-size:10.5px;color:var(--fg-muted);">profundo · usar versão clara</div>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:8px;">
      <div style="width:64px;height:64px;background:#DDC9C3;border-radius:8px;display:flex;align-items:center;justify-content:center;"><img src="../assets/logo-mark.png" style="width:46px;height:46px;object-fit:contain;"/></div>
      <div style="font-size:10.5px;color:var(--fg-muted);">bege · OK</div>
    </div>
  </div>
  <div style="font-size:11px;color:var(--fg-muted);line-height:1.55;">Clear space mínimo = ½ da altura do mark. Tamanho mínimo: 24px. Nunca aplicar sombra ou efeitos.</div>
</div></body></html>
